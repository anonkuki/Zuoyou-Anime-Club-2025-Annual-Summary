<!--
  ============================================================
  佐佑动漫社 2025 年度总结 — 船票层 HTML 结构
  ============================================================
  
  功能：用户验证通过后展示的个人化"太空船票"
  - 船票包含：用户姓名、资历等级、所属部门徽章
  - 激光打孔动画：依次打出 "2025" 四个数字
  - 全息浮层效果 (hologram-overlay)
  - 点击船票触发 launchShip() 进入飞行动画
  
  Phase: body.phase-ticket
  由 verifyUser() 激活
  
  依赖：
  - launchShip() 函数
  - triggerPunchAnimation() 函数
  - CSS 动画: laser-beam, punch-sparks
  ============================================================
-->

<div id="ticket-layer">
    <div class="ticket-card" id="my-ticket" onclick="launchShip()">
        <!-- 全息浮层效果 -->
        <div class="hologram-overlay"></div>

        <!-- 2025 打孔区域 - 激光逐字打孔动画 -->
        <div class="ticket-punch-area" id="punch-area">
            <div class="punch-hole" data-num="2" style="--delay: 0.2s;">
                <div class="laser-beam"></div>
            </div>
            <div class="punch-hole" data-num="0" style="--delay: 1.0s;">
                <div class="laser-beam"></div>
            </div>
            <div class="punch-hole" data-num="2" style="--delay: 1.8s;">
                <div class="laser-beam"></div>
            </div>
            <div class="punch-hole" data-num="5" style="--delay: 2.6s;">
                <div class="laser-beam"></div>
            </div>
        </div>
        <div class="punch-sparks" id="punch-sparks"></div>

        <!-- 船票头部 -->
        <div class="ticket-header">
            <div class="ticket-logo">NEBULA PASS</div>
            <div class="ticket-class" id="ticket-number">NO.2025</div>
        </div>

        <!-- 船票主体信息 -->
        <div class="ticket-body">
            <div class="ticket-row">
                <div class="ticket-label">Passenger</div>
                <div class="ticket-value" id="ticket-name">UNKNOWN</div>
            </div>
            <div class="ticket-row">
                <div class="ticket-label">Authority Rank</div>
                <div class="ticket-value highlight" id="ticket-rank">--</div>
            </div>
            <div class="ticket-row">
                <div class="ticket-label">Departments</div>
                <div class="ticket-depts-row" id="ticket-depts"></div>
            </div>
        </div>

        <!-- 船票底部 -->
        <div class="ticket-footer">
            <div class="scan-line">✦ CLICK TO BOARD ✦</div>
            <div class="ticket-hint">点击船票开始星际之旅</div>
        </div>
    </div>
</div>
