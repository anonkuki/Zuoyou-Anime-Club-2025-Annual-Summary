<!--
  ============================================================
  佐佑动漫社 2025 年度总结 — 星系探索层 HTML 结构
  ============================================================
  
  功能：3D 星系核心交互界面
  - Three.js 渲染 6 颗部门星球 + 中央太阳
  - 用户点击星球进入对应部门页面
  - 顶部进度条追踪已探索的星球（0/6 → 6/6）
  - 探索完 6 颗星球后，中央太阳解锁个人报告入口
  
  Phase: body.phase-system
  由 launchShip() 激活
  
  部门星球映射：
  - art    → 原创部 (ART)
  - cos    → COS部  (COS)
  - pr     → 外宣部 (PR)
  - tech   → 技术部 (TECH)
  - music  → 轻音部 (MUSIC)
  - dance  → 舞蹈部 (DANCE)
  
  依赖：
  - init3D() — Three.js 场景初始化
  - showReport() — 进入个人报告
  - DEPARTMENTS 配置数组
  ============================================================
-->

<div id="system-layer">
    <!-- 页面标题 -->
    <div class="header">
        <h1>NEBULA ARCHIVES</h1>
        <div class="sub">Annual Report 2025</div>
    </div>

    <!-- 游戏风进度条 - 轨道设计 -->
    <div id="progress-panel">
        <div class="progress-title">
            <span class="progress-icon">🛸</span>
            <span>EXPLORATION LOG</span>
        </div>
        <div class="progress-orbit">
            <div class="orbit-track"></div>
            <!-- 6 颗进度星球点 - 代表 6 个部门 -->
            <div class="progress-planets" id="progress-planets">
                <div class="planet-dot" data-dept="cos" data-name="COS" data-index="1" title="COS部"></div>
                <div class="planet-dot" data-dept="tech" data-name="TECH" data-index="3" title="技术部"></div>
                <div class="planet-dot" data-dept="music" data-name="MUSIC" data-index="4" title="轻音部"></div>
                <div class="planet-dot" data-dept="art" data-name="ART" data-index="0" title="原创部"></div>
                <div class="planet-dot" data-dept="dance" data-name="DANCE" data-index="5" title="舞蹈部"></div>
                <div class="planet-dot" data-dept="pr" data-name="PR" data-index="2" title="外宣部"></div>
            </div>
        </div>
        <div class="progress-stats">
            <div class="progress-counter">
                <span id="progress-count">0</span><span>/6</span>
            </div>
            <div class="progress-hint" id="progress-hint">点击任意星球 · 开始你的探索日记</div>
        </div>
    </div>

    <!-- Three.js 星球标签容器 -->
    <div id="labels-container"></div>

    <!-- 中央太阳卡片 - 探索完成后解锁 -->
    <div id="sun-card" class="star-card locked" style="--glow-color: #ffd700;" onclick="showReport()">
        <div class="card-body">
            <div class="card-title" style="color: #ffd700;">星云核心</div>
            <div class="card-data">探索 6 颗星球后解锁个人报告</div>
        </div>
        <div class="card-line"></div>
    </div>
</div>
