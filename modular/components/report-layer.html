<!--
  ============================================================
  佐佑动漫社 2025 年度总结 — 个人报告层 HTML 结构
  ============================================================
  
  功能：最终个人年度报告（Swiper 滑动卡片）
  - 使用 Swiper.js 实现全屏卡片滑动
  - 由 renderSlides(user) 动态填充内容
  - 页面指示器显示当前页/总页
  
  报告卡片顺序（约 15-17 页）：
  1.  用户名称页
  2.  收录总数据页
  3.  用户个人投稿数
  4.  部门参与信息页 1
  5.  部门参与信息页 2
  6.  活跃画像 1
  7.  活跃画像 2
  8.  星图数据页
  9.  星图页（3D 安利星图）
  10. 弹幕数据页
  11. 弹幕页
  12. 回忆数据页
  13. 回忆页
  14. 烟花数据页
  15. 烟花祝福页
  16. 报幕页
  17. 分享页（海报导出）
  
  Phase: body.phase-report
  由 showReport() 激活
  
  依赖：
  - Swiper.js (v11) — 卡片滑动框架
  - html2canvas — 海报截图
  - renderSlides(user) — 内容生成
  ============================================================
-->

<div id="report-layer">
    <!-- 页码指示器 -->
    <div class="report-page-indicator" id="reportPageIndicator">
        <span class="page-current" id="pageCurrent">1</span>
        <span class="page-sep">/</span>
        <span class="page-total" id="pageTotal">1</span>
        <div class="page-bar">
            <div class="page-bar-fill" id="pageBarFill"></div>
        </div>
    </div>

    <!-- Swiper 卡片容器 -->
    <div class="swiper">
        <div class="swiper-wrapper" id="slides-container">
            <!-- 由 renderSlides(user) 动态注入各页卡片 -->
        </div>
    </div>
</div>
