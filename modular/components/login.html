<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 佐佑年度报告</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/cyber.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-dark);
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .login-card {
            background: var(--cyber-bg-light);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            padding: 40px;
        }

        .login-title {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            color: var(--cyber-primary);
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--cyber-primary);
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--cyber-primary);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .file-drop-zone {
            border: 2px dashed rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-drop-zone:hover {
            border-color: var(--cyber-primary);
            background: rgba(0, 255, 255, 0.05);
        }

        .file-drop-zone.dragover {
            border-color: var(--cyber-primary);
            background: rgba(0, 255, 255, 0.1);
        }

        .file-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .file-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .file-name {
            margin-top: 10px;
            color: var(--cyber-primary);
            font-size: 12px;
            font-family: 'Orbitron', monospace;
        }

        .cyber-btn {
            width: 100%;
            margin-top: 10px;
        }

        .log-container {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: var(--cyber-primary);
        }

        .log-line {
            margin-bottom: 5px;
        }

        .log-error {
            color: var(--cyber-secondary);
        }

        .log-success {
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">佐佑年度报告</h1>
            <p class="login-subtitle">年度总结系统 v10.0</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">选择数据文件</label>
                    <div class="file-drop-zone" id="dropZone">
                        <div class="file-icon">📁</div>
                        <div class="file-text">点击或拖拽 Excel 文件到此处</div>
                        <div class="file-name" id="fileName"></div>
                    </div>
                    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
                </div>

                <button type="submit" class="cyber-btn" id="startBtn" disabled>
                    开始生成报告
                </button>
            </form>

            <div class="log-container" id="logContainer">
                <div class="log-line">等待文件导入...</div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const startBtn = document.getElementById('startBtn');
        const logContainer = document.getElementById('logContainer');

        let selectedFile = null;

        // 点击选择文件
        dropZone.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // 拖拽事件
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            startBtn.disabled = false;
            log(`已选择文件: ${file.name}`);
        }

        function log(message, type = 'info') {
            const line = document.createElement('div');
            line.className = 'log-line';
            if (type === 'error') line.classList.add('log-error');
            if (type === 'success') line.classList.add('log-success');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(line);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!selectedFile) return;

            startBtn.disabled = true;
            log('开始解析 Excel 文件...');

            // TODO: 解析 Excel 文件
            setTimeout(() => {
                log('数据解析完成!', 'success');
                log('正在跳转...');
                // 跳转逻辑
            }, 1500);
        });
    </script>
</body>
</html>
