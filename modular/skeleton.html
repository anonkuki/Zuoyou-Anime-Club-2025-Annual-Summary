  本文件展示成品页面 (end.html) 的完整 HTML 骨架结构。

  外部依赖 (CDN)：

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>佐佑动漫社 2025 年度报告 - 星际航行</title>

    <!-- ==================== 字体 ==================== -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;700&family=Press+Start+2P&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <!-- ==================== 第三方 CSS ==================== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- ==================== 第三方 JS (头部加载) ==================== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- ==================== 内嵌 CSS ==================== -->
    <!--
      CSS 分为以下几个部分 (在成品中合并为一个 <style> 块)：
      1. CSS 变量与基础重置           → styles/base.css
      2. 登录层样式                   → (内嵌)
      3. 船票层样式                   → (内嵌)
      4. 星系层 & 3D Canvas 样式      → (内嵌)
      5. 部门各主题样式               → styles/cyber.css, neon.css, pixel.css, ...
      6. 个人报告 Swiper 样式         → (内嵌)
      7. 烟花 & 安利星图样式          → (内嵌)
    -->
    <style>
        /* 见 styles/ 目录下各主题文件 */
    </style>
</head>
<body class="phase-login">

    <!-- ==================== 音频 ==================== -->
    <audio id="bgMusic" loop preload="auto">
        <source src="assets/audio_*.mp3" type="audio/mpeg">
    </audio>

    <!-- 音乐控制按钮 (固定右下角) -->
    <div id="musicControlWrapper">
        <div id="volumeSlider"><!-- 音量滑块 --></div>
        <div id="musicControl" onclick="toggleMusic()">
            <span id="musicIcon">🔊</span>
        </div>
    </div>

    <!-- ==================== 加载器 ==================== -->
    <div id="loader">
        <div class="loader-text">INITIALIZING STARGATE...</div>
        <div class="loader-spinner"></div>
    </div>

    <!-- ==================== 3D 画布 ==================== -->
    <canvas id="bgCanvas"></canvas>   <!-- 首页星空背景 (Canvas 2D) -->
    <canvas id="glCanvas"></canvas>   <!-- Three.js 3D 场景 -->

    <!-- ==================== 各功能层 ==================== -->
    
    <!-- 层1: 登录 → 见 components/login-layer.html -->
    <!-- #login-layer -->
    
    <!-- 层2: 船票 → 见 components/ticket-layer.html -->
    <!-- #ticket-layer -->
    
    <!-- 层3: 星系探索 → 见 components/system-layer.html -->
    <!-- #system-layer -->
    
    <!-- 层4: 个人报告 → 见 components/report-layer.html -->
    <!-- #report-layer -->
    
    <!-- 层5: 部门展示 → 见 components/dept-layer.html -->
    <!-- #dept-layer -->

    <!-- 返回星系按钮 (报告页用) -->
    <div id="back-btn" onclick="backToSystem()" title="返回星系">←</div>

    <!-- ==================== 第三方 JS (底部加载) ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- ==================== 内嵌 JS 脚本 ==================== -->
    <!--
      JS 分为三大脚本块：
      
      Script 1: 主业务逻辑
        - DB[] 用户数据         (由工具预注入)
        - WEIXIN_ARTICLES[]     微信文章数据
        - BILIBILI_VIDEOS[]     B站视频数据
        - DEPARTMENTS[]         部门星球配置
        - TextureFactory        程序化贴图生成
        - init3D()              Three.js 场景初始化
        - animate()             主渲染循环
        - verifyUser()          用户验证
        - launchShip()          飞船动画
        - showDeptPage()        部门页面
        - render*Dept()         6个部门渲染函数
        - renderSlides()        个人报告生成
      
      Script 2: 特效系统
        - Drone 粒子背景        首页装饰效果
        - 烟花系统              10+ 种烟花弹型 + 音效
        - 音乐控制              双音轨管理 + 淡入淡出
        - 3D 安利星图            CSS3DRenderer 星云展示
      
      Script 3: 柚子阅读模式
        - YouziReadingMode      自动演示/阅读模式
        - 输入"柚子"自动遍历所有部门并生成报告
    -->

    </script>

</body>
</html>
