<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COS部 - 佐佑年度报告</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/pixel.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1f3d 100%);
        }

        .dept-header {
            text-align: center;
            padding: 60px 20px;
        }

        .dept-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 32px;
            color: #ff69b4;
            text-shadow:
                3px 3px 0 #00ced1,
                6px 6px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .polaroid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .polaroid {
            background: #fff;
            padding: 12px 12px 40px 12px;
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transform: rotate(var(--rotation, 0deg));
            transition: transform 0.3s;
        }

        .polaroid:hover {
            transform: rotate(0deg) scale(1.05);
            z-index: 10;
        }

        .polaroid:nth-child(1) { --rotation: -3deg; }
        .polaroid:nth-child(2) { --rotation: 2deg; }
        .polaroid:nth-child(3) { --rotation: -2deg; }
        .polaroid:nth-child(4) { --rotation: 3deg; }

        .photo {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #ff69b4, #00ced1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }

        .caption {
            color: #333;
            font-family: 'Comic Sans MS', cursive;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff69b4;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin: 40px auto;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
        }

        .stats-number {
            font-family: 'Press Start 2P', monospace;
            font-size: 48px;
            color: #ff69b4;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        .stats-label {
            color: #00ced1;
            font-size: 14px;
            margin-top: 10px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="dept-header">
        <h1 class="dept-title">COS部</h1>
        <p style="color: rgba(255,255,255,0.6);">粉色像素 · 拍立得风格</p>
    </div>

    <div class="stats-card">
        <div class="stats-number">12</div>
        <div class="stats-label">COS 次 数</div>
    </div>

    <div class="polaroid-grid">
        <div class="polaroid">
            <div class="photo">📸</div>
            <div class="caption">角色名: xxx</div>
        </div>
        <div class="polaroid">
            <div class="photo">🎭</div>
            <div class="caption">角色名: xxx</div>
        </div>
        <div class="polaroid">
            <div class="photo">✨</div>
            <div class="caption">角色名: xxx</div>
        </div>
        <div class="polaroid">
            <div class="photo">🌸</div>
            <div class="caption">角色名: xxx</div>
        </div>
    </div>
</body>
</html>
