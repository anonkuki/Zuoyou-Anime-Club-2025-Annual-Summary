<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻音部 - 佐佑年度报告</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/neon.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 100%);
        }

        .dept-header {
            text-align: center;
            padding: 60px 20px;
        }

        .dept-title {
            font-size: 40px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: none;
        }

        .wave-container {
            display: flex;
            gap: 6px;
            align-items: flex-end;
            justify-content: center;
            height: 60px;
            margin: 20px 0;
        }

        .wave-bar {
            width: 8px;
            background: linear-gradient(180deg, #ff006e, #8338ec, #3a86ff);
            border-radius: 4px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 20px; }
            50% { height: 50px; }
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { animation-delay: 0.4s; }
        .wave-bar:nth-child(8) { animation-delay: 0.3s; }

        .song-card {
            background: linear-gradient(135deg, rgba(131, 56, 236, 0.2), rgba(58, 134, 255, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto 40px;
            backdrop-filter: blur(10px);
        }

        .song-title {
            font-size: 18px;
            color: #fff;
            margin-bottom: 15px;
        }

        .neon-btn {
            display: inline-block;
            background: transparent;
            border: 2px solid #ff006e;
            color: #ff006e;
            padding: 14px 32px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px;
        }

        .neon-btn:hover {
            background: #ff006e;
            color: #fff;
            box-shadow: 0 0 20px #ff006e;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff006e, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="dept-header">
        <h1 class="dept-title">轻音部</h1>
        <div class="wave-container">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <p style="color: rgba(255,255,255,0.5);">Music // Neon</p>
    </div>

    <div class="song-card">
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value">24h</div>
                <div class="stat-label">排练时长</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">8</div>
                <div class="stat-label">演出次数</div>
            </div>
        </div>
        <h3 class="song-title">🎵 最喜欢的歌</h3>
        <p style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">Into The Night</p>
        <button class="neon-btn">▶ 播放</button>
    </div>
</body>
</html>
