<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术部 - 佐佑年度报告</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/cyber.css">
    <style>
        body {
            min-height: 100vh;
            background: var(--cyber-bg);
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .dept-header {
            text-align: center;
            padding: 60px 20px;
        }

        .dept-title {
            font-family: 'Orbitron', monospace;
            font-size: 36px;
            color: var(--cyber-primary);
            text-shadow: var(--cyber-glow);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .tech-card {
            background: var(--cyber-bg-light);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .tech-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyber-primary), transparent);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .tech-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .tech-label {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            color: var(--cyber-primary);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .tech-value {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            color: #fff;
        }

        .glitch-text {
            position: relative;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .code-block {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: var(--cyber-primary);
            margin-top: 15px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="dept-header">
        <h1 class="dept-title glitch-text">技术部</h1>
        <p style="color: rgba(255,255,255,0.5);">SYSTEM // CYBERPUNK</p>
    </div>

    <div class="tech-grid">
        <div class="tech-card">
            <div class="tech-icon">🌙</div>
            <div class="tech-label">LATEST NIGHT</div>
            <div class="tech-value">03:47</div>
            <div class="code-block">熬夜记录: 3次通宵</div>
        </div>
        <div class="tech-card">
            <div class="tech-icon">📷</div>
            <div class="tech-label">SHUTTER / EDIT</div>
            <div class="tech-value">156</div>
            <div class="code-block">快门: 89 | 剪辑: 67</div>
        </div>
        <div class="tech-card">
            <div class="tech-icon">💻</div>
            <div class="tech-label">PROJECT COUNT</div>
            <div class="tech-value">8</div>
            <div class="code-block">代码提交记录</div>
        </div>
    </div>
</body>
</html>
