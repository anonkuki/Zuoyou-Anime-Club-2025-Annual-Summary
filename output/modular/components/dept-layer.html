<!--
  ============================================================
  佐佑动漫社 2025 年度总结 — 部门展示层 HTML 结构
  ============================================================
  
  功能：各部门的详细展示页面
  - 点击星系中的星球后进入
  - 由 showDeptPage(deptId) 动态填充内容
  - 每个部门使用独立的视觉风格主题
  - 返回按钮返回星系
  
  6 个部门的风格主题：
  - COS部    → 像素风 (pixel)     — 拍立得照片、像素边框
  - 技术部   → 赛博朋克 (cyber)    — Glitch 效果、扫描线
  - 轻音部   → 霓虹 (neon)        — 音频波形、彩虹渐变
  - 原创部   → 水彩 (watercolor)   — 柔和渐变、画框
  - 舞蹈部   → 星空 (galaxy)      — 粒子背景、深空蓝
  - 外宣部   → 漫画 (comic)       — 分镜面板、气泡对话框
  
  Phase: body.phase-dept (由 phase-system 切换而来)
  
  依赖：
  - showDeptPage(deptId) — 根据部门 ID 分发渲染
  - backFromDept() — 返回星系
  - render*Dept() — 各部门专用渲染函数
  ============================================================
-->

<div id="dept-layer">
    <!-- 返回星系按钮 -->
    <button class="dept-back-btn" onclick="backFromDept()">← 返回星系</button>
    
    <!-- 部门内容容器 - 由 JS 动态填充 -->
    <div id="dept-content">
        <!-- 
          根据 deptId 动态注入，可能的内容包括：
          - 部门 Intro 动画（showDeptIntro）
          - 部门成员照片网格（renderDeptGrid）
          - 部门统计数据
          - 周常照片集（renderWeeklyPhotos）
          - 外宣部额外包含影响力看板（renderInfluenceDashboard）
        -->
    </div>
</div>
